!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>医療領収書 翻訳・計算</title>
    <!-- 読み込み速度が速い最新版を利用 -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; padding: 20px; background: #fff; }
        .box { max-width: 500px; margin: auto; }
        #status { color: #007bff; font-weight: bold; margin: 20px; min-height: 24px; }
        canvas { max-width: 100%; border: 1px solid #ccc; display: none; margin-top: 10px; }
        .btn { background: #007bff; color: #fff; padding: 15px; border-radius: 8px; cursor: pointer; display: block; width: 80%; margin: 10px auto; font-weight: bold; }
        #saveBtn { background: #28a745; display: none; }
        select { width: 80%; padding: 10px; font-size: 16px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h3>🏥 領収書：翻訳＆円換算</h3>
        <select id="ratio">
            <option value="0.3">3割負担 (30%)</option>
            <option value="0.2">2割負担 (20%)</option>
            <option value="0.1">1割負担 (10%)</option>
            <option value="1.0">全額負担 (100%)</option>
        </select>
        <label class="btn">📸 撮影・写真を選択
            <input type="file" id="inp" accept="image/*" style="display:none;">
        </label>
        <div id="status">写真を読み込んでください</div>
        <div id="saveBtn" class="btn">加工画像を保存</div>
        <canvas id="cvs"></canvas>
    </div>

<script>
    const inp = document.getElementById('inp'), st = document.getElementById('status'), cvs = document.getElementById('cvs'), ctx = cvs.getContext('2d'), saveBtn = document.getElementById('saveBtn'), rat = document.getElementById('ratio');

    inp.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        st.innerText = "画像を読み込み中...";
        const img = new Image();
        img.src = URL.createObjectURL(file);
        
        img.onload = async () => {
            // iPhoneのメモリ対策：幅1000pxに縮小
            const scale = 1000 / img.width;
            cvs.width = 1000;
            cvs.height = img.height * scale;
            ctx.drawImage(img, 0, 0, cvs.width, cvs.height);
            cvs.style.display = "block";

            st.innerText = "文字を解析中...（約30秒）";
            
            try {
                // iPhoneでも止まりにくい軽量設定で実行
                const worker = await Tesseract.createWorker('jpn');
                const { data } = await worker.recognize(file);
                
                st.innerText = "書き込み中...";
                const ratio = parseFloat(rat.value);
                const dict = {"初診":"First Visit","再診":"Follow-up","投薬":"Medication","注射":"Injection","検査":"Test","合計":"TOTAL"};

                data.lines.forEach(line => {
                    const txt = line.text.replace(/\s+/g, '');
                    const box = line.bbox;
                    const x = box.x0 * scale, y = box.y0 * scale, w = (box.x1-box.x0)*scale, h = (box.y1-box.y0)*scale;
                    const fs = h * 0.9;

                    // 1. 翻訳(黒字で上書き)
                    for (let k in dict) {
                        if (txt.includes(k)) {
                            ctx.fillStyle = "white"; ctx.fillRect(x, y, w, h);
                            ctx.fillStyle = "black"; ctx.font = `bold ${fs}px Arial`;
                            ctx.fillText(dict[k], x, y + fs * 0.8);
                        }
                    }
                    // 2. 点数➔Yen(赤字で右横へ)
                    const m = txt.match(/(\d+)(?=点)/);
                    if (m) {
                        ctx.fillStyle = "red"; ctx.font = `bold ${fs}px Arial`;
                        const yen = Math.round(parseInt(m[0]) * 10 * ratio);
                        ctx.fillText(` (${yen.toLocaleString()} Yen)`, (box.x1 * scale) + 5, y + fs * 0.8);
                    }
                });

                await worker.terminate();
                st.innerText = "完了！保存してください";
                saveBtn.style.display = "block";
            } catch (err) {
                st.innerText = "エラー: " + err.message;
            }
        };
    };

    saveBtn.onclick = () => {
        const link = document.createElement('a');
        link.href = cvs.toDataURL('image/png');
        link.download = 'receipt_en.png';
        link.click();
    };
</script>
</body>
</html>
